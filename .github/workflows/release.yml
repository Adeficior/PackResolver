name: Release

on:
   workflow_dispatch:
   release:
      types: [published]
   push:
      branches: [main]

permissions:
   id-token: write
   contents: write

jobs:
   release:
      if: github.event_name == 'release'
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2

         - name: Install Dependencies
           run: bun install --frozen-lockfile

         - name: Update version
           uses: jossef/action-set-json-field@v2
           with:
              file: package.json
              field: version
              value: ${{ github.event.release.tag_name }}

         - run: bun run build

         - run: bun publish --no-git-checks --provenance --access public

   check:
      runs-on: ubuntu-latest
      if: github.event_name != 'release'
      outputs:
         tag: ${{ steps.action.outputs.tag }}
         matched: ${{ steps.action.outputs.matched }}
      steps:
         - uses: PssbleTrngle/find-release@v1
           if: ${{ github.event_name != 'pull_request' }}
           id: action
           with:
              type: draft
              token: ${{ secrets.GITHUB_TOKEN }}

   prerelease:
      runs-on: ubuntu-latest
      needs: [check]
      if: fromJSON(needs.check.outputs.matched)
      steps:
         - uses: actions/checkout@v6

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2

         - name: Install Dependencies
           run: bun install --frozen-lockfile

         - name: Update version
           uses: jossef/action-set-json-field@v2
           with:
              file: package.json
              field: version
              value: ${{ needs.check.outputs.tag }}

         - run: bun run build

         - uses: actions/setup-node@v6
           with:
              registry-url: "https://registry.npmjs.org"
              package-manager-cache: false

         - run: npm publish --no-git-checks --provenance --access public --tag rc
