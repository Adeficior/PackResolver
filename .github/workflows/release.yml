name: Release

on:
   release:
      types: [published]

jobs:
   release:
      permissions:
         contents: read
         packages: write

      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2

         - name: Install Dependencies
           run: bun install --frozen-lockfile

         - name: Update version
           uses: jossef/action-set-json-field@v2
           with:
              file: package.json
              field: version
              value: ${{ github.event.release.tag_name }}

         - run: bun run build

         - run: bun npm publish --no-git-checks --provenance --access public
           env:
              NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
